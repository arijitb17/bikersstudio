# docker-compose.staging.yml — STAGING SERVER (develop branch)
# Mirror of prod but uses :staging image tag and lighter resource limits.
# The CI/CD pipeline writes .env before calling this file.
# IMAGE_NAME must be exported in the shell before running.

services:
  app:
    image: ${IMAGE_NAME:?IMAGE_NAME must be exported}/motostore-app:staging
    ports:
      - '3001:3000'    # staging runs on 3001 if sharing the same EC2
    env_file: .env
    volumes:
      - uploads_data:/app/public/uploads
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          memory: 128M

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: motostore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network

  migrate:
    image: ${IMAGE_NAME:?IMAGE_NAME must be exported}/motostore-app:staging
    command: npx prisma migrate deploy
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: 'no'

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'      # staging nginx on 8080 to avoid collision with prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  app_data:

networks:
  app_network:
    driver: bridge