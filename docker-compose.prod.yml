# docker-compose_prod.yml — PRODUCTION SERVER
# App image is pulled from Docker Hub (pre-built by CI/CD).
# DB and Redis run as containers on the same server.
#
# The CI/CD pipeline writes .env before calling this file.
# IMAGE_NAME must be exported in the shell before running:
#   export IMAGE_NAME=yourdockerusername/motostore-app

services:
  app:
    image: ${IMAGE_NAME:?IMAGE_NAME must be exported}/motostore-app:latest
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - uploads_data:/app/public/uploads
      - app_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          memory: 256M

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: motostore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network
    # Do NOT expose port 5432 to the host on production

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app_network
    # Do NOT expose port 6379 to the host on production

  migrate:
    image: ${IMAGE_NAME:?IMAGE_NAME must be exported}/motostore-app:latest
    command: npx prisma migrate deploy
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: 'no'

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  app_data:

networks:
  app_network:
    driver: bridge