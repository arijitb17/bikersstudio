# docker-compose.prod.yml — PRODUCTION (optimized for t3.small 2GB RAM)

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bikersstudio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c work_mem=4MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 150M

  migrate:
    image: ghcr.io/arijitb17/bikersstudio:latest
    command: npx prisma migrate deploy
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: 'no'

  app:
    image: ghcr.io/arijitb17/bikersstudio:latest
    restart: unless-stopped
    env_file: .env
    user: root
    volumes:
      - uploads_data:/app/public/uploads
      - app_data:/app/data
      - next_cache:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 700M
        reservations:
          memory: 256M

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  app_data:
  next_cache:

networks:
  internal:
    driver: bridge